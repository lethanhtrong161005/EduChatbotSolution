<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your EduChatAI Account Is Ready</title>
</head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:'Segoe UI',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f3f4f6;padding:40px 0;">
    <tr><td align="center">
      <table role="presentation" width="560" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);">
        <!-- Header -->
        <tr>
          <td style="background:linear-gradient(135deg,#2ecc71 0%,#27ae60 100%);padding:36px 40px;text-align:center;">
            <div style="font-size:28px;font-weight:700;color:#ffffff;letter-spacing:-0.5px;">EduChatAI</div>
            <div style="font-size:14px;color:rgba(255,255,255,0.85);margin-top:4px;">Admin · Account Created</div>
          </td>
        </tr>
        <!-- Body -->
        <tr>
          <td style="padding:40px 40px 32px;">
            <p style="font-size:17px;font-weight:600;color:#111827;margin:0 0 8px;">Hi {{NAME}},</p>
            <p style="font-size:15px;color:#4b5563;margin:0 0 24px;line-height:1.6;">
              An administrator has created and activated an account for you on <strong>EduChatAI</strong>.
              Use the credentials below to sign in.
            </p>
            <!-- Credentials -->
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:20px 24px;margin-bottom:24px;">
              <tr>
                <td style="font-size:14px;color:#374151;padding:4px 0;">
                  <strong style="color:#111827;">Email:</strong>&nbsp;&nbsp;{{EMAIL}}
                </td>
              </tr>
              <tr>
                <td style="font-size:14px;color:#374151;padding:4px 0;">
                  <strong style="color:#111827;">Password:</strong>&nbsp;&nbsp;<code style="background:#dcfce7;border-radius:4px;padding:2px 6px;font-size:15px;color:#15803d;letter-spacing:1px;">{{PASSWORD}}</code>
                </td>
              </tr>
            </table>
            <!-- Login Button -->
            <div style="text-align:center;margin:0 0 28px;">
              <a href="{{LOGIN_URL}}"
                 style="display:inline-block;background:#2ecc71;color:#ffffff;padding:12px 32px;border-radius:6px;text-decoration:none;font-weight:600;font-size:15px;">
                Sign In
              </a>
            </div>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td style="background:#f9fafb;padding:20px 40px;text-align:center;border-top:1px solid #e5e7eb;">
            <span style="font-size:12px;color:#9ca3af;">© 2026 EduChatAI. All rights reserved.</span>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
